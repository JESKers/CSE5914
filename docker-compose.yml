version: "3.8"

# JESKers — Smart Car Recommendation, Purchase & Rental API.
# Single self-contained service: FastAPI + SQLite catalog (seeded from data.csv
# and the NHTSA vPIC make directory). No Elasticsearch required.
services:
  api:
    build: .
    container_name: jeskers_api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
